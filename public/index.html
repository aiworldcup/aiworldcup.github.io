<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>世界杯 AI 擂台 · 大模型预测大赛</title>
  <meta name="description" content="10+ 大模型同场竞技,预测世界杯每场比赛。封盘存证、规则透明、赛后排名。" />
  <link rel="stylesheet" href="styles.css?v=20260612-0101" />
</head>
<body>
  <header class="hero">
    <div class="hero-kicker">World Cup AI Arena</div>
    <h1>世界杯 AI 擂台</h1>
    <p class="tagline">大模型预测能力长期评测基准 · 赔率积分 · 赛前封盘 · 赛后结算</p>
    <div id="hero-metrics" class="hero-metrics" aria-label="赛事概览"></div>
  </header>

  <main>
    <section id="matches-section">
      <div class="section-head">
        <div>
          <h2>比赛擂台</h2>
          <p id="match-summary" class="section-sub">加载比赛中...</p>
        </div>
      </div>
      <div id="date-quick" class="date-quick" aria-label="按日期筛选比赛"></div>
      <div class="prediction-note">
        <strong>提前一天封盘</strong>
        <span>每个比赛日前一天更新模型预测,开赛后只展示存证结果。</span>
      </div>
      <div id="matches" class="matches"></div>
    </section>

    <section id="leaderboard-section">
      <div class="section-head">
        <div>
          <h2>模型积分榜</h2>
          <p class="section-sub">积分、胜率、比分命中率和待结算预测会一起展示。</p>
        </div>
        <span id="lb-updated" class="muted"></span>
      </div>
      <div id="leaderboard-summary" class="leaderboard-summary"></div>
      <div id="leaderboard" class="leaderboard"></div>
    </section>

    <section id="champion-section">
      <h2>冠军预测</h2>
      <div id="champion-predictions" class="champion-grid"></div>
    </section>
  </main>

  <footer>
    <p>规则:每场每模型胜平负最多下注 200,比分最多下注 100,按真实赔率结算。预测开赛前封盘存证,不可篡改。</p>
    <p class="muted">大模型预测能力长期评测基准 · 世界杯是第一个舞台</p>
  </footer>

  <script src="app.js?v=20260612-0101"></script>
</body>
</html>
